metadata:
  annotations:
    annotated-by: "gpu-extension"
  labels:
    labeled-by: "gpu-extension"
spec:
  tolerations:
  - key: "nvidia.com/gpu"
    operator: "Exists"
    effect: "NoSchedule"
  restartPolicy: Never
  volumes:
  - name: shared-memory
    ephemeral:
      volumeClaimTemplate:
        spec:
          emptyDir:
            medium: "Memory"
  - name: nvidia-install-dir-host
    ephemeral:
      volumeClaimTemplate:
        spec:
          hostPath:
            path: "/home/kubernetes/bin/nvidia/lib64"
  - name: gib
    ephemeral:
      volumeClaimTemplate:
        spec:
          hostPath:
            path: "/home/kubernetes/bin/gib"
  containers:
  - name: $job # overwrites job container
    resources:
      limits:
        nvidia.com/gpu: 8
    volumeMounts:
      - name: shared-memory
        mountPath: "/dev/shm"
      - name: nvidia-install-dir-host
        mountPath: /usr/local/nvidia/lib64
      - name: gib
        mountPath: /usr/local/gib
    env:
    - name: LD_LIBRARY_PATH
      value: "/usr/local/nvidia/lib64"
    - name: CUDA_DEVICE_MAX_CONNECTIONS
      value: "1"
    - name: XLA_PYTHON_CLIENT_MEM_FRACTION
      value : "0.92"
    - name: TF_FORCE_GPU_ALLOW_GROWTH
      value: "true"
    - name: NCCL_DEBUG
      value: "WARN"
    - name: NCCL_CROSS_NIC
      value: "0"
    - name: NCCL_NET_GDR_LEVEL
      value: "PIX"
    - name: NCCL_P2P_NET_CHUNKSIZE
      value: "131072"
    - name: NCCL_P2P_PCI_CHUNKSIZE
      value: "131072"
    - name: NCCL_P2P_NVL_CHUNKSIZE
      value: "524288"
    - name: NCCL_NVLS_CHUNKSIZE
      value: "524288"
    - name: NCCL_IB_GID_INDEX
      value: "3"
    - name: NCCL_IB_ADAPTIVE_ROUTING
      value: "1"
    - name: NCCL_IB_QPS_PER_CONNECTION
      value: "4"
    - name: NCCL_IB_TC
      value: "52"
    - name: NCCL_IB_FIFO_TC
      value: "84"
    - name: NCCL_SHIMNET_GUEST_CONFIG_CHECKER_CONFIG_FILE
      value: "/root/axlearn/cloud/gcp/nccl/a4_high/guest_config.txtpb"
    - name: NCCL_TUNER_CONFIG_PATH
      value: "/root/axlearn/cloud/gcp/nccl/a4_high/tuner_config.txtpb"
    - name: XLA_FLAGS
      value: "--xla_gpu_all_reduce_combine_threshold_bytes=2147483648 --xla_gpu_all_gather_combine_threshold_bytes=2147483648 --xla_gpu_reduce_scatter_combine_threshold_bytes=2147483648 --xla_gpu_cudnn_gemm_fusion_level=3 --xla_gpu_enable_command_buffer=FUSION,CUSTOM_CALL--xla_gpu_enable_latency_hiding_scheduler=true --xla_gpu_enable_triton_gemm=false --xla_gpu_enable_pipelined_all_gather=true --xla_gpu_enable_pipelined_reduce_scatter=true --xla_gpu_enable_pipelined_all_reduce=true --xla_gpu_enable_while_loop_double_buffering=true --xla_gpu_enable_all_gather_combine_by_dim=false --xla_gpu_enable_reduce_scatter_combine_by_dim=false --xla_disable_hlo_passes=rematerialization"
    imagePullPolicy: Always
    image: "busybox:1.28" # Ignored

