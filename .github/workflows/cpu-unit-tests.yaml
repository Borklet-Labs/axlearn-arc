name: cpu-unit-tests
on:
  workflow_dispatch
jobs:
  cpu-unit-tests-job:
    runs-on: jobset
    container:
      # image: us-docker.pkg.dev/supercomputer-testing/axlearn/arc-jobset-post-cmd-nightly:latest
      image: us-central1-docker.pkg.dev/supercomputer-testing/axlearn/arc-jobset:py3.12-jax-nightly-cam
      env:
        GCS_PREFIX: gs://axlearn-arc-testing/testing
        ARC_JOBSET_NAME: cpu-unit-tests
        ARC_JOBSET_JSON: /var/arc/cpu.json
        JOBSET_DOCKER_IMAGE: us-central1-docker.pkg.dev/supercomputer-testing/axlearn/arc-cpu:py3.12-jax-nightly-cam
        JOBSET_HEALTHY_TIMEOUT: 3600
        RESUME_JOBSET: true
        # Optional flags
        CUSTOM_GIT_ORIGIN: https://github.com/Borklet-Labs/axlearn
        CUSTOM_GIT_BRANCH: jax_0.10.2
        # POST_SETUP_CMD: pip install importlib_resources && pip install -U --pre jax jaxlib -i https://us-python.pkg.dev/ml-oss-artifacts-published/jax/simple/ --extra-index-url https://pypi.org/simple || echo setup_failed
    steps:
      - name: Launch the CPU unit tests
        run: GH_RUN_ID=${{ github.run_id }} python3 /var/arc/launch_jobset.py
      - name: Delete JobSet if cancelling
        if: cancelled()
        run: python3 /var/arc/cleanup_jobset.py
