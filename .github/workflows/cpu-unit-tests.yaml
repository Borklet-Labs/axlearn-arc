name: cpu-unit-tests
on:
  workflow_dispatch
jobs:
  cpu-unit-tests-job:
    runs-on: cpu
    container:
      image: us-docker.pkg.dev/supercomputer-testing/axlearn/arc-cpu:python3.12
      env:
        GCS_PREFIX: gs://axlearn-arc-testing/testing
        # Optional flags
        # CUSTOM_GIT_ORIGIN: https://github.com/apple/axlearn # Optionally point to another repo
        CUSTOM_GIT_BRANCH: jax_0.7.0_py3.12
        ARC_JOBSET_NAME: axlearn-cpu-unit-tests
        ARC_JOBSET_JSON: /var/arc/cpu.json
        TRAINING_DOCKER_IMAGE: us-docker.pkg.dev/supercomputer-testing/axlearn/arc-cpu:python3.12
    steps:
      - name: Install the Kubernetes Python SDK
        run: uv pip install kubernetes
      - name: Launch the GPU training job
        run: exec python3 /var/arc/launch_cpu_jobset.py