name: tpu-unit-tests
on:
  workflow_dispatch
jobs:
  tpu-unit-tests-job:
    runs-on: tpu
    container:
      image: us-docker.pkg.dev/supercomputer-testing/axlearn/arc-tpu:latest
    steps:
      - name: Fetch the latest AXLearn commit
        run: cd /root && git clone --depth 1 https://github.com/apple/axlearn.git
      - name: Install AXLearn and pytest dependiencies with uv
        run: cd /root/axlearn && uv pip install --prerelease=allow .[core,tpu,gcp] pytest pytest-instafail allure-pytest torch pytest-xdist
      - name: Create output directories
        run: mkdir -p /home/runner/_work/{xml_results,allure_results}
      - name: Modify ulimit for tests
        run: ulimit -n 1000000
      - name: Run unit tests
        run: /bin/bash /root/tpu-unit-tests.sh && echo "All tests passed successfully"