name: cpu-tests
on:
  push:
    branches: [ main ]
jobs:
  cpu-test-job:
    runs-on: cpu
    container:
      image: us-docker.pkg.dev/supercomputer-testing/axlearn/arc:latest
    steps:
      - name: Check for AXLearn directory
        run: (ls /root/axlearn && echo found AXLearn) || (echo No AXLearn)
      - name: Run tests for CPU platform
        run: (/bin/bash /root/setup.sh) || (echo Tests failed)